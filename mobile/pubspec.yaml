name: mobile
description: "Livraison express avec notification push"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.1

  # Architecture & State
  flutter_bloc: ^8.1.4
  bloc: ^8.1.3
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.1
  dio_smart_retry: ^6.0.0
  connectivity_plus: ^6.0.1

  # Local Storage (Offline First)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Real-time (Socket)
  socket_io_client: ^2.0.3+1

  # Firebase
  firebase_core: ^2.31.0
  firebase_messaging: ^14.7.9

  # Geoloc & Maps
  geolocator: ^10.1.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # UI (STRICT - Version corrigée ici)
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  lucide_icons: ^0.257.0
  image_picker: ^1.1.0
  signature: ^5.4.0

  # Utils
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ^0.18.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.7
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1


flutter:
  uses-material-design: true
  assets:
    - .env